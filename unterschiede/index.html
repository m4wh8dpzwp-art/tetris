<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finde die Unterschiede</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #f1f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }
  h1 { margin: 6px 0 4px; font-size: 1.5em; text-align: center; }
  #status {
    margin-bottom: 14px;
    font-size: 1.05em;
    background: #334155;
    padding: 8px 16px;
    border-radius: 10px;
  }
  #status span.found { color: #4ade80; font-weight: bold; }
  #game-wrap {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1000px;
    width: 100%;
  }
  .img-box {
    position: relative;
    flex: 1 1 320px;
    max-width: 460px;
    border: 3px solid #475569;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .img-box img {
    display: block;
    width: 100%;
    height: auto;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .hotspot {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
  }
  .hotspot.found {
    border: 3px solid #22c55e;
    background: rgba(34,197,94,0.28);
    box-shadow: 0 0 0 4px rgba(34,197,94,0.35);
  }
  #objects-list {
    max-width: 700px;
    width: 100%;
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .obj-chip {
    background: #334155;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.9em;
    border: 2px solid transparent;
  }
  .obj-chip.found {
    border-color: #22c55e;
    color: #4ade80;
    text-decoration: line-through;
    opacity: 0.75;
  }
  #win-message {
    display: none;
    margin-top: 18px;
    font-size: 1.3em;
    font-weight: bold;
    color: #facc15;
    text-align: center;
    animation: pop 0.4s ease;
  }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  #reset-btn {
    display: none;
    margin-top: 14px;
    padding: 10px 22px;
    font-size: 1em;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
  }
  #reset-btn:hover { background: #6366f1; }
  .hint { font-size: 0.85em; opacity: 0.7; margin-top: 4px; }
</style>
</head>

    });
  });

  function handleClick(diff) {
    if (diff._found) return;
    diff._found = true;
    document.querySelectorAll('.hotspot[data-name="' + diff.name + '"]').forEach(el => el.classList.add('found'));
    const chip = document.getElementById(diff.chip);
    if (chip) chip.classList.add('found');
    foundCount++;
    document.getElementById('found-count').textContent = foundCount;
    if (foundCount === total) {
      document.getElementById('win-message').style.display = 'block';
      document.getElementById('reset-btn').style.display = 'inline-block';
    }
  }
</script>

</body>
</html>
