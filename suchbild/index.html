<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suchbild-Spiel</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #f1f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    margin: 6px 0 4px;
    font-size: 1.6em;
    text-align: center;
  }
  #status {
    margin-bottom: 14px;
    font-size: 1.05em;
    background: #334155;
    padding: 8px 16px;
    border-radius: 10px;
  }
  #status span.found { color: #4ade80; font-weight: bold; }
  #game-wrap {
    position: relative;
    max-width: 480px;
    width: 100%;
    border: 3px solid #475569;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  #game-img {
    display: block;
    width: 100%;
    height: auto;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .hotspot {
    position: absolute;
    border: 2px dashed rgba(255,255,255,0);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hotspot.found {
    border-color: #22c55e;
    background: rgba(34,197,94,0.25);
    box-shadow: 0 0 0 4px rgba(34,197,94,0.35);
  }
  .hotspot.wrong-flash {
    background: rgba(239,68,68,0.35);
  }
  #objects-list {
    max-width: 480px;
    width: 100%;
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .obj-chip {
    background: #334155;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.95em;
    border: 2px solid transparent;
  }
  .obj-chip.found {
    border-color: #22c55e;
    color: #4ade80;
    text-decoration: line-through;
    opacity: 0.75;
  }
  #win-message {
    display: none;
    margin-top: 18px;
    font-size: 1.3em;
    font-weight: bold;
    color: #facc15;
    text-align: center;
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #reset-btn {
    display: none;
    margin-top: 14px;
    padding: 10px 22px;
    font-size: 1em;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
  }
  #reset-btn:hover { background: #6366f1; }
</style>
</head>

  <div class="obj-chip" id="chip-plate">🍽️ Weißer Teller</div>
  <div class="obj-chip" id="chip-hairclip">🎀 Haarspange</div>

  <div class="obj-chip" id="chip-glasses">👓 Brille</div>

<div id="win-message">🎉 Super gemacht! Alle Objekte gefunden! 🎉</div>
<button id="reset-btn" onclick="location.reload()">Nochmal spielen</button>

<script>
  const total = document.querySelectorAll('.hotspot').length;
  document.getElementById('total-count').textContent = total;
  let foundCount = 0;

  document.querySelectorAll('.hotspot').forEach(spot => {
    spot.addEventListener('click', () => {
      if (spot.classList.contains('found')) return;
      spot.classList.add('found');
      const name = spot.dataset.name;
      const chip = document.getElementById('chip-' + name);
      if (chip) chip.classList.add('found');
      foundCount++;
      document.getElementById('found-count').textContent = foundCount;
      if (foundCount === total) {
        document.getElementById('win-message').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'inline-block';
      }
    });
  });

  document.getElementById('game-img').addEventListener('click', (e) => {
    // small red flash feedback for misses handled via hotspot z-index already;
  });
</script>
